# ==============================================================================
# CONCEPT CLÉ : Principe du Moindre Privilège (Least Privilege)
# L'application ne doit pas avoir des droits d'administration sur le cluster.
# On lui associe un compte de service (ServiceAccount) dédié avec des droits 
# strictement limités (Role + RoleBinding) : ici, lire la liste de ses propres pods.
# Les données sensibles (variables d'environnement) sont isolées dans un Secret.
# ==============================================================================
apiVersion: v1
kind: ServiceAccount
metadata:
  name: app-tp1-sa
  namespace: default
---
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: app-tp1-role
  namespace: default
rules:
- apiGroups: [""]
  resources: ["pods"]
  verbs: ["get", "list"] # L'application peut uniquement auditer les pods
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: app-tp1-rolebinding
  namespace: default
subjects:
- kind: ServiceAccount
  name: app-tp1-sa # Liaison au compte de service créé ci-dessus
  namespace: default
roleRef:
  kind: Role
  name: app-tp1-role
  apiGroup: rbac.authorization.k8s.io
---
apiVersion: v1
kind: Secret
metadata:
  name: app-tp1-secret
  namespace: default
type: Opaque
data:
  # Valeurs générées avec `echo -n "mon_nom" | base64`
  # Exemple factice pour des identifiants (admin / super_password)
  DB_USER: YWRtaW4= 
  DB_PASS: c3VwZXJfcGFzc3dvcmQ=
